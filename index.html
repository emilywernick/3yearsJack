<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Anniversary</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple: #D8C4E8;
      --blue:   #7BA7C2;
      --green:  #7BAF8C;
      --dark-purple: #9B7BBF;
      --black:  #1a1a1a;
      --cream:  #faf8ff;
    }

    body {
      background: var(--cream);
      min-height: 100vh;
      font-family: 'Lato', sans-serif;
      overflow-x: hidden;
    }

    /* ── CONFETTI CANVAS ── */
    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ══════════════════════════════════
       PASSWORD SCREEN
    ══════════════════════════════════ */
    #password-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, var(--purple) 0%, #e8d8f5 40%, var(--blue) 80%, #a8c8e0 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      overflow: hidden;
      gap: 0;
    }

    /* ── POLAROID STRIP ── */
    .polaroid-strip {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 36px;
      padding: 0 12px;
      flex-wrap: nowrap;
    }

    /*
      
    */
    .polaroid {
      background: #fff;
      border: 1px solid #ddd;
      box-shadow: 2px 3px 10px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 8px 28px;
      position: relative;
      flex-shrink: 0;
    }

    .polaroid-img {
      width: 100%;
      height: 100%;
      background-color: #e8e0f0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Caption area at bottom of polaroid */
    .polaroid-caption {
      position: absolute;
      bottom: 5px;
      font-family: 'Lato', sans-serif;
      font-size: 9px;
      color: #888;
      letter-spacing: 0.05em;
    }

    /* Individual polaroid sizes and rotations */
    .polaroid-1 {
      width: 110px; height: 155px;
      transform: rotate(-8deg) translateY(10px);
    }
    .polaroid-1 .polaroid-img {
      background-image: url(IMG_2124.JPG);
    }

    .polaroid-2 {
      width: 120px; height: 165px;
      transform: rotate(-3deg) translateY(4px);
    }
    .polaroid-2 .polaroid-img {
      background-image: url(IMG_4634.JPG);
    }

    .polaroid-3 {
      width: 125px; height: 170px;
      transform: rotate(1deg);
    }
    .polaroid-3 .polaroid-img {
      background-image: url(IMG_5067.JPG);
    }

    .polaroid-4 {
      width: 120px; height: 165px;
      transform: rotate(4deg) translateY(4px);
    }
    .polaroid-4 .polaroid-img {
      background-image: url(IMG_2132.JPG);
    }

    .polaroid-5 {
      width: 110px; height: 155px;
      transform: rotate(9deg) translateY(10px);
    }
    .polaroid-5 .polaroid-img {
      background-image: url(IMG_5405.JPG);
    }

    /* ── PASSWORD FORM ── */
    #password-screen h2 {
      font-family: 'Great Vibes', cursive;
      font-size: 52px;
      color: var(--black);
      text-align: center;
      margin-bottom: 6px;
      text-shadow: 0 2px 12px rgba(255,255,255,0.7);
      padding: 0 20px;
      line-height: 1.2;
    }

    #password-screen p.pw-sub {
      font-family: 'Lato', sans-serif;
      font-size: 13px;
      color: #555;
      margin-bottom: 22px;
      letter-spacing: 0.05em;
    }

    #password-screen input {
      font-family: 'Lato', sans-serif;
      font-size: 16px;
      padding: 11px 18px;
      border: 2px solid var(--black);
      border-radius: 30px;
      background: rgba(255,255,255,0.88);
      color: var(--black);
      outline: none;
      width: 220px;
      text-align: center;
      letter-spacing: 0.12em;
      margin-bottom: 12px;
    }

    #password-screen input:focus {
      border-color: var(--dark-purple);
    }

    #password-screen button {
      font-family: 'Lato', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 11px 36px;
      background: var(--black);
      color: #fff;
      border: 2px solid var(--black);
      border-radius: 30px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    #password-screen button:hover {
      background: var(--dark-purple);
      border-color: var(--dark-purple);
    }

    #password-error {
      font-size: 13px;
      color: #a33;
      margin-top: 10px;
      min-height: 18px;
      font-style: italic;
    }

    /* mobile polaroids */
    @media (max-width: 600px) {
      .polaroid-strip { gap: 8px; }
      .polaroid-1, .polaroid-5 { width: 80px; height: 115px; }
      .polaroid-2, .polaroid-4 { width: 88px; height: 122px; }
      .polaroid-3 { width: 92px; height: 128px; }
      #password-screen h2 { font-size: 40px; }
    }

    /* ══════════════════════════════════
       MAIN CONTENT
    ══════════════════════════════════ */
    #main-content {
      display: none;
      position: relative;
      z-index: 1;
    }

    /* ── HEADER BANNER ── */
    .banner {
      width: 100%;
      background: linear-gradient(135deg, var(--purple) 0%, #c8d8f0 50%, var(--blue) 100%);
      border-bottom: 2px solid var(--black);
      padding: 64px 20px 52px;
      text-align: center;
      position: relative;
    }

    .banner h1 {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(52px, 10vw, 96px);
      color: var(--black);
      line-height: 1.1;
    }

    .banner-sub {
      font-family: 'Lato', sans-serif;
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--black);
      opacity: 0.6;
      margin-top: 14px;
    }

    /* ── COLOR STRIP ── */
    .strip {
      display: flex;
      width: 100%;
      height: 10px;
    }
    .s1 { flex: 1; background: var(--purple); border-right: 1.5px solid var(--black); }
    .s2 { flex: 1; background: var(--blue);   border-right: 1.5px solid var(--black); }
    .s3 { flex: 1; background: var(--green);  border-right: 1.5px solid var(--black); }
    .s4 { flex: 1; background: var(--purple); border-right: 1.5px solid var(--black); }
    .s5 { flex: 1; background: var(--blue);   border-right: 1.5px solid var(--black); }
    .s6 { flex: 1; background: var(--green);  border-right: 1.5px solid var(--black); }
    .s7 { flex: 1; background: var(--purple); border-right: 1.5px solid var(--black); }
    .s8 { flex: 1; background: var(--blue);   border-right: 1.5px solid var(--black); }
    .s9 { flex: 1; background: var(--green);  }

    /* ── VIDEO SECTION ── */
    .video-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 20px 64px;
      gap: 24px;
      background: var(--cream);
    }

    .section-label {
      font-family: 'Great Vibes', cursive;
      font-size: 40px;
      color: var(--black);
      opacity: 0.75;
    }

    .video-frame {
      position: relative;
      width: 100%;
      max-width: 660px;
    }

    .video-frame::before {
      content: '';
      position: absolute;
      inset: 0;
      transform: translate(10px, 10px);
      background: var(--green);
      border: 2px solid var(--black);
      z-index: 0;
    }

    .video-frame::after {
      content: '';
      position: absolute;
      inset: 0;
      transform: translate(5px, 5px);
      background: var(--blue);
      border: 2px solid var(--black);
      z-index: 1;
    }

    .video-frame video {
      position: relative;
      z-index: 2;
      width: 100%;
      display: block;
      border: 2px solid var(--black);
      background: #000;
    }

    /* ── PHOTO GALLERY ── */
    .gallery-section {
      background: linear-gradient(180deg, var(--cream) 0%, #ede8f5 100%);
      border-top: 2px solid var(--black);
      padding: 56px 20px 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    .gallery-title {
      font-family: 'Great Vibes', cursive;
      font-size: 44px;
      color: var(--black);
    }

    
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      width: 100%;
      max-width: 720px;
    }

    @media (max-width: 520px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
    }

    .gallery-polaroid {
      background: #fff;
      border: 1.5px solid #ccc;
      box-shadow: 3px 4px 12px rgba(0,0,0,0.12);
      padding: 10px 10px 36px;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s;
    }

    .gallery-polaroid:hover {
      transform: scale(1.03) rotate(-1deg);
    }

    .gallery-polaroid:nth-child(even) {
      transform: rotate(1.5deg);
    }

    .gallery-polaroid:nth-child(even):hover {
      transform: scale(1.03) rotate(1deg);
    }

    .gallery-photo {
      width: 100%;
      aspect-ratio: 1 / 1;
      background-color: #ddd5ee;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .gallery-caption {
      margin-top: 10px;
      font-family: 'Lato', sans-serif;
      font-size: 11px;
      color: #888;
      text-align: center;
      letter-spacing: 0.06em;
    }

    .two-photo-row {
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: center;
      width: 100%;
      max-width: 620px;
    }

    .big-photo {
      width: 100%;
      aspect-ratio: 4 / 3;
      background-color: #ddd5ee;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      border: 2px solid var(--black);
    }

    /* ── FOOTER ── */
    .footer {
      border-top: 2px solid var(--black);
      background: var(--purple);
      padding: 32px 20px;
      text-align: center;
    }

    .footer p {
      font-family: 'Great Vibes', cursive;
      font-size: 28px;
      color: var(--black);
    }

    .footer-dots {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 14px;
    }

    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid var(--black);
    }
    .dot:nth-child(1) { background: var(--purple); }
    .dot:nth-child(2) { background: var(--blue); }
    .dot:nth-child(3) { background: var(--green); }
    .dot:nth-child(4) { background: var(--purple); }
    .dot:nth-child(5) { background: var(--blue); }

  </style>
</head>
<body>

  <canvas id="confetti-canvas"></canvas>

  <!-- ══ PASSWORD SCREEN ══ -->
  <div id="password-screen">

    <!-- 5 POLAROIDS — change url(photo1.jpg) etc to your actual filenames -->
    <div class="polaroid-strip">
      <div class="polaroid polaroid-1">
        <div class="polaroid-img"></div>
        <span class="polaroid-caption">✦</span>
      </div>
      <div class="polaroid polaroid-2">
        <div class="polaroid-img"></div>
        <span class="polaroid-caption">✦</span>
      </div>
      <div class="polaroid polaroid-3">
        <div class="polaroid-img"></div>
        <span class="polaroid-caption">✦</span>
      </div>
      <div class="polaroid polaroid-4">
        <div class="polaroid-img"></div>
        <span class="polaroid-caption">✦</span>
      </div>
      <div class="polaroid polaroid-5">
        <div class="polaroid-img"></div>
        <span class="polaroid-caption">✦</span>
      </div>
    </div>

    <h2>Happy Anniversary</h2>
    <p class="pw-sub">enter your password to open it</p>
    <input type="password" id="password-input" placeholder="password"
           onkeydown="if(event.key==='Enter') checkPassword()" />
    <button onclick="checkPassword()">Open</button>
    <div id="password-error"></div>
  </div>

  <!-- ══ MAIN CONTENT ══ -->
  <div id="main-content">

    <div class="banner">
      <h1>Happy Anniversary</h1>
    </div>

    <!-- VIDEO SECTION — two videos -->
    <div class="video-section">
      <p class="section-label">press play ↓</p>
      <div class="video-frame">
    
        <video controls>
          <source src="video3.mov" type="video/mp4" />
          Your browser does not support the video tag.
        </video>
      </div>
      <div class="video-frame">
       
        <video controls>
          <source src="video2.mov" type="video/mp4" />
          Your browser does not support the video tag.
        </video>
      </div>
    </div>

    <!-- TWO PHOTO SLOTS -->
    <div class="gallery-section">
      <p class="gallery-title">sketches</p>
      <div class="two-photo-row">
        <!--
          PHOTO 1 & 2: add style="background-image: url(yourphoto.jpg)" to each div
          e.g. <div class="big-photo" style="background-image: url(beach.jpg)">
        -->
        <div class="big-photo" style="background-image: url(IMG_0817.JPG)"></div>
        <div class="big-photo" style="background-image: url(IMG_0818.JPG)"></div>
      </div>
    </div>

    <div class="footer">
      <p>with love ✦</p>
      <div class="footer-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div>
      </div>
    </div>

  </div>

  <script>
    const CORRECT_PASSWORD = "schwebo";

    function checkPassword() {
      const input = document.getElementById("password-input").value;
      const error = document.getElementById("password-error");
      if (input === CORRECT_PASSWORD) {
        document.getElementById("password-screen").style.display = "none";
        document.getElementById("main-content").style.display = "block";
        launchConfetti();
      } else {
        error.textContent = "not quite — try again!";
        document.getElementById("password-input").value = "";
        document.getElementById("password-input").focus();
      }
    }

    function launchConfetti() {
      const canvas = document.getElementById("confetti-canvas");
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const colors = ["#D8C4E8", "#7BA7C2", "#7BAF8C", "#9B7BBF", "#ffffff"];
      const pieces = Array.from({ length: 150 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * -canvas.height,
        w: Math.random() * 10 + 5,
        h: Math.random() * 5 + 4,
        color: colors[Math.floor(Math.random() * colors.length)],
        speed: Math.random() * 3 + 1.5,
        angle: Math.random() * 360,
        spin: (Math.random() - 0.5) * 4,
        drift: (Math.random() - 0.5) * 1.5,
      }));
      let frame = 0;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate((p.angle * Math.PI) / 180);
          ctx.fillStyle = p.color;
          ctx.strokeStyle = "#1a1a1a";
          ctx.lineWidth = 0.7;
          ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
          ctx.strokeRect(-p.w/2, -p.h/2, p.w, p.h);
          ctx.restore();
          p.y += p.speed;
          p.x += p.drift;
          p.angle += p.spin;
          if (p.y > canvas.height) {
            p.y = -20;
            p.x = Math.random() * canvas.width;
          }
        });
        frame++;
        if (frame < 320) requestAnimationFrame(draw);
        else ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
      draw();
    }
  </script>

</body>
</html>
